services:
  # fdp_postgres is used ONLY for Airflow metadata (airflow DB).
  # Application data (ingestion, dbt, dashboard) lives in the Windows Postgres on the host.
  postgres:
    image: postgres:16
    container_name: fdp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"   # 5432 is owned by Windows Postgres; metadata DB only
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-airflow-db.sql:/docker-entrypoint-initdb.d/init-airflow-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Airflow — scheduled multi-pool ingestion
  # First run: docker compose --profile airflow up -d
  # UI: http://localhost:8080  (admin / admin)

  airflow-init:
    image: apache/airflow:2.9.2
    container_name: fdp_airflow_init
    profiles: ["airflow"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      PYTHONPATH: /opt/airflow
      # Installs ingestion deps inside the container on first start (~2 min)
      _PIP_ADDITIONAL_REQUIREMENTS: "hypersync psycopg2-binary sqlalchemy python-dotenv pandas pyarrow"
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ingestion:/opt/airflow/ingestion

  airflow-scheduler:
    image: apache/airflow:2.9.2
    container_name: fdp_airflow_scheduler
    profiles: ["airflow"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      PYTHONPATH: /opt/airflow
      POSTGRES_HOST: host.docker.internal   # Windows Postgres — data warehouse
      _PIP_ADDITIONAL_REQUIREMENTS: "hypersync psycopg2-binary sqlalchemy python-dotenv pandas pyarrow"
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ingestion:/opt/airflow/ingestion
    restart: unless-stopped

  airflow-webserver:
    image: apache/airflow:2.9.2
    container_name: fdp_airflow_webserver
    profiles: ["airflow"]
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      _PIP_ADDITIONAL_REQUIREMENTS: "hypersync psycopg2-binary sqlalchemy python-dotenv pandas pyarrow"
    ports:
      - "8080:8080"
    command: webserver
    volumes:
      - ./dags:/opt/airflow/dags
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: fdp_dashboard
    env_file: .env
    environment:
      POSTGRES_HOST: host.docker.internal   # Windows Postgres — data warehouse
    ports:
      - "8050:8050"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
